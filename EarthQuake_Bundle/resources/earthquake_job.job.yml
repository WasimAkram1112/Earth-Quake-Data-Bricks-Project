resources:
  jobs:
    EarthQuake_Job:
      name: EarthQuake_Job
      tasks:
        - task_key: Data_Ingestion
          notebook_task:
            notebook_path: ../src/Notebooks/Ingestion.ipynb
            base_parameters:
              catalog_name: ${var.catalog}
            source: WORKSPACE
        - task_key: Data_Flattening
          depends_on:
            - task_key: Data_Ingestion
          pipeline_task:
            pipeline_id: ${resources.pipelines.EarthQuake_Bundle_etl.id}
            full_refresh: false
        - task_key: Earthquake_Dashboard
          depends_on:
            - task_key: Data_Flattening
          dashboard_task:
            subscription: {}
            warehouse_id: 3155f770daac267c
            dashboard_id: ${resources.dashboards.earthquake_monitor.id}

      queue:
        enabled: true
      parameters:
        - name: catalog_name
          default: ${var.catalog}
      performance_target: PERFORMANCE_OPTIMIZED
