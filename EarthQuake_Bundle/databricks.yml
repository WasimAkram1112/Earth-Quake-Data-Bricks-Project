# This is a Databricks asset bundle definition for EarthQuake_Bundle.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: EarthQuake_Bundle
  uuid: 88405188-b9a0-4654-8045-7f16df6c77c3

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use
  warehouse_id:
    description: WarehouseID
  spn_id:
    description: Service Principal Name for pipeline run_as

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-41fc0b12-8956.cloud.databricks.com
    variables:
      catalog: earthquake_catalog_dev
      schema: dev
      warehouse_id: 3155f770daac267c
      spn_id: "c5ed63c4-b273-4550-b24d-34a6799ffad9"
    presets:
      artifacts_dynamic_version: true
  prod:
    mode: production
    workspace:
      host: https://dbc-41fc0b12-8956.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/wasimakramb325@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Earth-Quake-Data-Bricks-Project

    variables:
      catalog: earthquake_catalog_prod
      schema: prod
      warehouse_id: 3155f770daac267c
      spn_id: "c5ed63c4-b273-4550-b24d-34a6799ffad9"
    permissions:
      - user_name: wasimakramb325@gmail.com
        level: CAN_MANAGE
      - group_name: earthquake_prod_writer
        level: CAN_MANAGE
